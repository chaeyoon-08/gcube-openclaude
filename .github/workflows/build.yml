name: Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  # ============================================================
  # 기존 이미지 (basic) - gcube-openclaude
  # ============================================================
  build-basic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (basic)
        id: meta-basic
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/gcube-openclaude
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push (basic)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          pull: true
          tags: ${{ steps.meta-basic.outputs.tags }}
          labels: ${{ steps.meta-basic.outputs.labels }}
          cache-from: type=gha,scope=basic
          cache-to: type=gha,mode=max,scope=basic
          build-args: |
            CACHEBUST=${{ github.run_number }}-${{ github.run_attempt }}

  # ============================================================
  # 신규 이미지 (vllm) - gcube-openclaude-vllm
  # ============================================================
  build-vllm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (vllm)
        id: meta-vllm
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/gcube-openclaude-vllm
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push (vllm)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.vllm
          push: true
          pull: true
          tags: ${{ steps.meta-vllm.outputs.tags }}
          labels: ${{ steps.meta-vllm.outputs.labels }}
          cache-from: type=gha,scope=vllm
          cache-to: type=gha,mode=max,scope=vllm
          build-args: |
            CACHEBUST=${{ github.run_number }}-${{ github.run_attempt }}